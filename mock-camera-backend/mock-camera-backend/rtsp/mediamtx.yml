rtspAddress:  :8554
protocols:    [udp, multicast, tcp]

# Disable các service không dùng (tránh xung đột port trên server chia sẻ).
# Mock camera chỉ cần RTSP + control API.
rtmp:         no
hls:          no
webrtc:       no
srt:          no

api:          yes
apiAddress:   :19997
logLevel:     info

paths:
  main:
    # profile_main = 3840x2160@30 H.264 (RTSS-1-1-42/48 verify resolution → giữ 4K).
    # CAP bitrate 2Mbps: 4K CRF mặc định quá nặng (~30-80Mbps) → DTT khi đã chạy
    # nhiều test parse RTSP-over-HTTP tunnel không kịp → MEDIA2_RTSS-1-1-2/4-1-2
    # đói frame trong full run (chỉ ~2-7fps, selected thì 72fps). Cap 2Mbps giữ
    # nguyên 4K30 (resolution không đổi) nhưng giảm data ~10-40x → tunnel nhẹ,
    # DTT đủ frame. runOnInitRestart giữ stream sống lại nếu ffmpeg thoát.
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=3840x2160:rate=30
      -c:v libx264 -preset ultrafast -tune zerolatency
      -b:v 2000k -maxrate 2000k -bufsize 2000k -g 30 -pix_fmt yuv420p
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/main
    runOnInitRestart: yes

  # RTSS-1-1-48 (H.264 RESOLUTION) kiểm resolution stream THẬT cho 2 mức:
  # highest 3840x2160 (dùng /main qua relay 8555) + lowest 640x480. Relay cache
  # SDP 4K lần đầu, KHÔNG phục vụ được 640 (H.264 resolution nằm trong SPS/SDP;
  # relay không rebuild được để refresh Desc). Nên phục vụ 640 từ stream RIÊNG
  # main640 (pre-warmed 640x480@30, 2Mbps) — Media1 GetStreamUri trả URI này
  # TRỰC TIẾP qua mediamtx 8554 khi config main = 640x480. KHÔNG đụng /main dùng
  # chung → relay + streaming test (MEDIA2_RTSS) không ảnh hưởng. 30fps để đủ
  # frame cho DTT đếm.
  main640:
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=640x480:rate=30
      -c:v libx264 -preset ultrafast -tune zerolatency
      -b:v 2000k -maxrate 2000k -bufsize 2000k -g 30 -pix_fmt yuv420p
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/main640
    runOnInitRestart: yes

  # RTSS-1-1-48 kiểm cả MEDIAN 1280x720 (ngoài highest 4K + lowest 640). Tương tự
  # main640, phục vụ 720 từ stream riêng main720 (pre-warmed) — relay không phục
  # vụ được 720 (cache SDP 4K).
  main720:
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=30
      -c:v libx264 -preset ultrafast -tune zerolatency
      -b:v 2000k -maxrate 2000k -bufsize 2000k -g 30 -pix_fmt yuv420p
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/main720
    runOnInitRestart: yes

  jpeg:
    # profile_jpeg = MJPEG 1920x1080@30. RTSS-1-1-31..36/53 cần JPEG stream với
    # STANDARD Huffman tables (RFC 2435 yêu cầu). ffmpeg mjpeg mặc định dùng
    # optimized Huffman → tool ONVIF reject. Fix bằng -huffman default +
    # -pix_fmt yuvj420p (RTP JPEG chỉ nhận YCbCr 4:2:0 hoặc 4:2:2).
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=1920x1080:rate=30
      -c:v mjpeg -huffman default -pix_fmt yuvj420p -q:v 5
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/jpeg
    runOnInitRestart: yes

  # jpeg640 = MJPEG 640x480 pre-warmed. RTSS-1-1-46 (JPEG RESOLUTION) test jpeg ở
  # highest(1920)+lowest(640). Thay vì respawn /jpeg khi đổi resolution (tạo gap
  # frame → relay đói frame → "Frames waiting timeout" ở 46/53), phục vụ mức 640
  # từ stream RIÊNG luôn chạy sẵn; Media1 GetStreamUri route jpeg→jpeg640 khi config
  # jpeg=640x480. Relay 8555 relay path này để có RTP header extension (RTSS-1-1-53).
  jpeg640:
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=640x480:rate=30
      -c:v mjpeg -huffman default -pix_fmt yuvj420p -q:v 5
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/jpeg640
    runOnInitRestart: yes

  # jpeg1280 = MJPEG 1280x720 pre-warmed. RTSS-1-1-46 test 3 mức: highest 1920
  # (/jpeg), MEDIAN 1280 (path này), lowest 640 (/jpeg640). Thiếu path 1280 →
  # config 1280 route nhầm /jpeg (1920) → "Checking actual resolution: Verification
  # failed". Giống main720 của H.264. GetStreamUri route jpeg config 1280x720 → đây.
  jpeg1280:
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=30
      -c:v mjpeg -huffman default -pix_fmt yuvj420p -q:v 5
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/jpeg1280
    runOnInitRestart: yes

  # sub1 = 1280x720 H.264. Trước để {} (không runOnInit) → ffmpeg chết là không
  # tự dậy → sub1 down → RTSS/MEDIA2 sub1 streaming + RTSS-1-1-48 (iterate sub1)
  # fail. Thêm runOnInit + runOnInitRestart để bền vững. Cap 2Mbps, 30fps để đủ
  # frame cho DTT đếm.
  sub1:
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=30
      -c:v libx264 -preset ultrafast -tune zerolatency
      -b:v 2000k -maxrate 2000k -bufsize 2000k -g 30 -pix_fmt yuv420p
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/sub1
    runOnInitRestart: yes

  sub2:
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=640x480:rate=10
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/sub2
    runOnInitRestart: yes

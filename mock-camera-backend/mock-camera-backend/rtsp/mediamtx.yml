rtspAddress:  :8554
protocols:    [udp, multicast, tcp]

# Disable các service không dùng (tránh xung đột port trên server chia sẻ).
# Mock camera chỉ cần RTSP + control API.
rtmp:         no
hls:          no
webrtc:       no
srt:          no

api:          yes
apiAddress:   :19997
logLevel:     info

paths:
  main:
    # profile_main = 3840x2160@30 H.264 (RTSS-1-1-42/48 verify resolution → giữ 4K).
    # CAP bitrate 2Mbps: 4K CRF mặc định quá nặng (~30-80Mbps) → DTT khi đã chạy
    # nhiều test parse RTSP-over-HTTP tunnel không kịp → MEDIA2_RTSS-1-1-2/4-1-2
    # đói frame trong full run (chỉ ~2-7fps, selected thì 72fps). Cap 2Mbps giữ
    # nguyên 4K30 (resolution không đổi) nhưng giảm data ~10-40x → tunnel nhẹ,
    # DTT đủ frame. runOnInitRestart giữ stream sống lại nếu ffmpeg thoát.
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=3840x2160:rate=30
      -c:v libx264 -preset ultrafast -tune zerolatency
      -b:v 2000k -maxrate 2000k -bufsize 2000k -g 30 -pix_fmt yuv420p
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/main
    runOnInitRestart: yes

  jpeg:
    # profile_jpeg = MJPEG 1920x1080@30. RTSS-1-1-31..36/53 cần JPEG stream với
    # STANDARD Huffman tables (RFC 2435 yêu cầu). ffmpeg mjpeg mặc định dùng
    # optimized Huffman → tool ONVIF reject. Fix bằng -huffman default +
    # -pix_fmt yuvj420p (RTP JPEG chỉ nhận YCbCr 4:2:0 hoặc 4:2:2).
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=1920x1080:rate=30
      -c:v mjpeg -huffman default -pix_fmt yuvj420p -q:v 5
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/jpeg
    runOnInitRestart: yes

  sub1: {}

  sub2:
    runOnInit: >-
      ffmpeg -re -f lavfi -i testsrc2=size=640x480:rate=10
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:8554/sub2
    runOnInitRestart: yes

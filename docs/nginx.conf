server {
    listen 8080;
    server_name _;

    # Disable upload size limit
    client_max_body_size 0;

    # 1. Forward all ONVIF SOAP API paths to ONVIF Server (port 8081)
    location /onvif {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /device_service {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    location /media2_service {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    # 2. Forward all other requests (RTSP-over-HTTP stream connections) to MediaMTX (port 8554)
    location / {
        proxy_pass http://127.0.0.1:8554;
        
        # Enable WebSocket/HTTP Tunneling protocols
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        
        # Turn off buffering for zero-latency streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
